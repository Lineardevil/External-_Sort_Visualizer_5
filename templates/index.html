<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>External Sort Visualizer</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <div id="start-screen">
        <div class="hero-content">
            <h1>EXTERNAL SORT<br><span>VISUALIZER</span></h1>
            <button class="btn-start" onclick="showPage('upload-screen')">START SYSTEM</button>
        </div>
    </div>
<div id="upload-screen" style="display: none;">
    <header class="game-header"><h1>STAGING <span>AREA</span></h1></header>
    <div class="upload-container">
        <div class="game-panel" style="width: 400px; margin-bottom: 20px;">
            <h2><span class="icon">⚙️</span> CONFIGURATION</h2>
            <div style="margin-bottom: 10px; display: flex; justify-content: space-between; align-items: center;">
                <label>BLOCK SIZE (B):</label>
                <input type="number" id="blockSizeInput" value="5" min="1" max="100" class="input-game">
            </div>
            <div style="margin-bottom: 10px; display: flex; justify-content: space-between; align-items: center;">
                <label>K-WAY MERGE (K):</label>
                <input type="number" id="kWayInput" value="4" min="2" max="20" class="input-game">
            </div>
            <div style="border-top: 1px solid var(--border-color); padding-top: 10px; margin-top: 10px;">
                <p style="font-size: 0.85rem;">Dự kiến RAM dùng: <span id="ram-estimate" class="neon-text">24</span> số</p>
            </div>
        </div>

        <input type="file" id="fileInput" hidden onchange="handleFileSelect()">
        <label for="fileInput" id="fileInputLabel" class="btn-game highlight">1. SELECT BINARY FILE</label>

        <div id="file-ready-area" class="game-panel" style="margin-top: 20px; display: none; width: 400px;">
            <p>File: <span id="info-filename" class="neon-text"></span> (N=<span id="info-n">0</span>)</p>
            <button id="btn-start-sort" onclick="triggerSort()" class="btn-game" style="width: 100%; background: #ff9f0a; color: #000; margin-top: 10px;">
                2. START SORTING SYSTEM
            </button>
        </div>

        <div id="result-area" class="game-panel" style="margin-top: 20px; display: none; width: 400px;">
            <p>Trạng thái: <span id="info-status" class="neon-text">COMPLETED</span></p>
            <div style="display: flex; gap: 10px; margin-top: 15px;">
                <a href="/download" id="btn-download" class="btn-game" style="flex: 1; text-decoration: none; background: #00ff88; color: #000; text-align: center;">
                    📥 DOWNLOAD
                </a>
                <button id="btn-visualize" onclick="goToVisualize()" class="btn-game" style="flex: 1;">
                    👁️ VISUALIZE
                </button>
            </div>
        </div>

        <div id="loading-area" style="display: none; margin-top: 20px;">
            <div class="loader"></div>
            <p class="neon-text">PROCESSING I/O...</p>
        </div>
    </div>
</div>

    <div id="visualize-screen" style="display: none;">
        <header class="game-header">
            <button onclick="showPage('upload-screen')" class="btn-game">BACK</button>
            <div class="timeline-box">
                <span id="io-display" class="neon-text" style="margin-right: 20px;">DISK READS: 0</span>
                <input type="range" id="stepSlider" min="0" value="0" oninput="seekStep(this.value)">
                <span id="stepDisplay">0/0</span>
                <button id="btn-pause" onclick="pauseAnimation()" class="btn-game">PAUSE</button>
            </div>
        </header>

        <main class="dashboard">
            <div class="left-col">
                <section class="game-panel">
                    <h2><span class="icon">💾</span> RUNS ON DISK</h2>
                    <div id="runs" class="runs-container"></div>
                </section>
                <section class="game-panel">
                    <h2><span class="icon">🧠</span> RAM BUFFERS (BLOCKS)</h2>
                    <div id="buffers-area"></div>
                </section>
            </div>

            <div class="right-col">
                <section class="game-panel">
                    <h2><span class="icon">🌳</span> MIN-HEAP TREE</h2>
                    <div id="heap"></div>
                </section>
                <section class="game-panel">
                    <h2><span class="icon">🎯</span> CURRENT PICKED</h2>
                    <div id="picked-container" class="picked-full-row">
                        <div id="picked"></div>
                    </div>
                </section>

                <section class="game-panel">
                    <h2><span class="icon">📊</span> FINAL OUTPUT</h2>
                    <div id="output" class="output-grid"></div>
                </section>
            </div>
        </main>
    </div>

    <script src="{{ url_for('static', filename='script.js') }}"></script>
    <div id="toast-container" class="toast-container"></div>
</body>
</html>
